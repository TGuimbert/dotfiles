name: "CI"
on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check Flake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
          extra_nix_config: "experimental-features = flakes nix-command pipe-operators"
      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: tguimbert
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Check flake (evaluate outputs without building them)
        run: |
          systems=$(nix eval --raw .#nixosConfigurations --apply \
            'cfgs: builtins.concatStringsSep " " (builtins.map (n: ".#nixosConfigurations." + n + ".config.system.build.toplevel") (builtins.attrNames cfgs))')
          shells=$(nix eval --raw .#devShells.x86_64-linux --apply \
            'sh: builtins.concatStringsSep " " (builtins.map (n: ".#devShells.x86_64-linux." + n) (builtins.attrNames sh))')
          nix build --dry-run $systems $shells

  build-systems:
    name: Build Systems
    runs-on: ubuntu-latest
    needs: check
    # Only run on Renovate PRs or push to main
    if: >
      github.event_name == 'push' ||
      startsWith(github.head_ref, 'renovate/')
    strategy:
      fail-fast: false
      matrix:
        system:
          - leshen
          - griffin
          - tuxedo
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/julia*
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /opt/microsoft /opt/google
          sudo rm -rf /opt/az
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /opt/ghc
          sudo docker image prune --all --force
          docker system prune -af || true
          docker builder prune -af || true
          df -h
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
          extra_nix_config: "experimental-features = flakes nix-command pipe-operators"
      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: tguimbert
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build ${{ matrix.system }}
        run: nix build .#nixosConfigurations.${{ matrix.system }}.config.system.build.toplevel

  build-shells:
    name: Build Shells
    runs-on: ubuntu-latest
    needs: check
    # Only run on Renovate PRs or push to main
    if: >
      github.event_name == 'push' ||
      startsWith(github.head_ref, 'renovate/')
    strategy:
      fail-fast: false
      matrix:
        shell:
          - go
          - markdown
          - nixos
          - nodejs
          - ops
          - protobuf
          - python
          - rust
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
          extra_nix_config: "experimental-features = flakes nix-command pipe-operators"
      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: tguimbert
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build ${{ matrix.shell }} shell
        run: nix build .#devShells.x86_64-linux.${{ matrix.shell }}

  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [check, build-systems, build-shells]
    if: always()
    steps:
      - name: Check job results
        run: |
          # check job must always pass
          if [[ "${{ needs.check.result }}" != "success" ]]; then
            echo "Check job failed"
            exit 1
          fi
          # build jobs only need to pass if they ran (Renovate PRs)
          if [[ "${{ needs.build-systems.result }}" == "failure" ]] || \
             [[ "${{ needs.build-shells.result }}" == "failure" ]]; then
            echo "Build jobs failed"
            exit 1
          fi
          echo "All required checks passed!"

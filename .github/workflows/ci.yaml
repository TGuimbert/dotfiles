name: "CI"
on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check Flake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31.10.3
      - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: tguimbert
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Check flake
        run: nix flake check --all-systems

  build-systems:
    name: Build Systems
    runs-on: ubuntu-latest
    needs: check
    # Only run on Renovate PRs or push to main
    if: >
      github.event_name == 'push' ||
      startsWith(github.head_ref, 'renovate/')
    strategy:
      fail-fast: false
      matrix:
        system:
          - leshen
          - griffin
          - tuxedo
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/julia*
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /opt/microsoft /opt/google
          sudo rm -rf /opt/az
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /opt/ghc
          sudo docker image prune --all --force
          docker system prune -af || true
          docker builder prune -af || true
          df -h
      - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31.10.3
      - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: tguimbert
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build ${{ matrix.system }}
        run: nix build .#nixosConfigurations.${{ matrix.system }}.config.system.build.toplevel

  build-shells:
    name: Build Shells
    runs-on: ubuntu-latest
    needs: check
    # Only run on Renovate PRs or push to main
    if: >
      github.event_name == 'push' ||
      startsWith(github.head_ref, 'renovate/')
    strategy:
      fail-fast: false
      matrix:
        shell:
          - go
          - markdown
          - nixos
          - nodejs
          - ops
          - protobuf
          - python
          - rust
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31.10.3
      - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: tguimbert
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build ${{ matrix.shell }} shell
        run: nix build .#devShells.x86_64-linux.${{ matrix.shell }}

  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [check, build-systems, build-shells]
    if: always()
    steps:
      - name: Check job results
        run: |
          # check job must always pass
          if [[ "${{ needs.check.result }}" != "success" ]]; then
            echo "Check job failed"
            exit 1
          fi
          # build jobs only need to pass if they ran (Renovate PRs)
          if [[ "${{ needs.build-systems.result }}" == "failure" ]] || \
             [[ "${{ needs.build-shells.result }}" == "failure" ]]; then
            echo "Build jobs failed"
            exit 1
          fi
          echo "All required checks passed!"
